name: CI/CD

on:
  push:
    branches: 
      - main
      - dev
      - 'refactor/**'
  pull_request:
    branches: 
      - main
      - dev

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '.'

      - run: cargo fmt --check --all
      - run: cargo check --all-features --workspace
      - run: cargo clippy --all-features --workspace --tests -- -D warnings
      - run: cargo test --all-features --workspace --verbose

  frontend:
    name: Frontend (TypeScript/React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm install --prefer-offline --no-audit
      - run: cd frontend && npm install --prefer-offline --no-audit
      - run: cd frontend && npx tsc --noEmit
      - run: cd frontend && npm run test
      - run: npm run web:build

  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm run web:build

      # Artifacts, optional for personal use
      - uses: actions/upload-artifact@v4
        with:
          name: backend-release
          path: target/release/tredo-server
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-release
          path: frontend/dist